apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "hortus-clavis.fullname" . }}-test-connection"
  labels:
    {{- include "hortus-clavis.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command:
        - wget
        - --timeout=5
        - --spider
        - "http://{{ include "hortus-clavis.fullname" . }}:{{ .Values.service.port }}/health"
  restartPolicy: Never
